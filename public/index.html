<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Supply SA — Vendor Assistant</title>
<style>
  :root {
    --navy: #55afa6;
    --gold: #c9a227;
    --bg: #f6f7f9;
    --bubble-bot: #ffffff;
    --bubble-user: #55afa6;
    --text: #1f2430;
    --border: #e1e4e9;
  }
  * { box-sizing: border-box; }
  body {
    margin: 0;
    font-family: Verdana, Geneva, sans-serif;
    background: var(--bg);
    color: var(--text);
  }
  .widget {
    max-width: 480px;
    margin: 24px auto;
    background: #fff;
    border-radius: 14px;
    box-shadow: 0 4px 24px rgba(0,0,0,0.08);
    overflow: hidden;
    display: flex;
    flex-direction: column;
    height: 680px;
  }
  .header {
    background: var(--navy);
    color: #fff;
    padding: 16px 20px;
  }
  .header h1 { font-size: 16px; margin: 0 0 2px; }
  .header p { font-size: 12px; margin: 0; opacity: 0.8; }

  .messages {
    flex: 1;
    overflow-y: auto;
    padding: 16px;
    display: flex;
    flex-direction: column;
    gap: 10px;
  }
  .msg { max-width: 88%; padding: 10px 14px; border-radius: 12px; font-size: 14px; line-height: 1.45; white-space: pre-wrap; }
  .msg.bot { background: var(--bubble-bot); border: 1px solid var(--border); align-self: flex-start; }
  .msg.user { background: var(--bubble-user); color: #fff; align-self: flex-end; }

  .option-group {
    align-self: flex-start;
    max-width: 92%;
    display: flex;
    flex-direction: column;
    gap: 6px;
  }
  .option-btn {
    background: #fff;
    border: 1px solid var(--navy);
    color: var(--navy);
    border-radius: 18px;
    padding: 8px 14px;
    font-size: 13px;
    cursor: pointer;
    text-align: left;
  }
  .option-btn:hover { background: var(--navy); color: #fff; }
  .option-btn.selected { background: var(--navy); color: #fff; }
  .option-btn:disabled { opacity: 0.45; cursor: default; }

  .multi-select-confirm {
    margin-top: 4px;
    background: var(--gold);
    color: #1f2430;
    border: none;
    border-radius: 18px;
    padding: 8px 14px;
    font-size: 13px;
    font-weight: 600;
    cursor: pointer;
    align-self: flex-start;
  }

  .group-card {
    align-self: flex-start;
    max-width: 92%;
    border: 1px solid var(--border);
    background: #fafbfc;
    border-radius: 12px;
    padding: 12px 14px;
    font-size: 13px;
  }
  .group-card h4 { margin: 0 0 6px; font-size: 13px; color: var(--navy); }
  .group-card ul { margin: 6px 0; padding-left: 18px; }
  .group-card .group-note { font-size: 12px; color: #946200; margin-top: 6px; }
  .group-card .group-actions { display: flex; gap: 8px; margin-top: 10px; }
  .group-btn {
    flex: 1;
    border: 1px solid var(--navy);
    background: #fff;
    color: var(--navy);
    border-radius: 8px;
    padding: 7px 10px;
    font-size: 12px;
    cursor: pointer;
  }
  .group-btn.primary { background: var(--navy); color: #fff; }
  .group-btn:disabled { opacity: 0.5; cursor: default; }

  .summary-card {
    align-self: flex-start;
    max-width: 95%;
    border: 1px solid var(--border);
    background: #fff;
    border-radius: 12px;
    padding: 14px;
    font-size: 13px;
  }
  .summary-card h4 { margin: 0 0 8px; font-size: 14px; color: var(--navy); }
  .summary-section { margin-bottom: 10px; }
  .summary-section .label { font-weight: 600; font-size: 12px; text-transform: uppercase; letter-spacing: 0.02em; color: #555; margin-bottom: 4px; }
  .summary-item { padding: 4px 0; border-bottom: 1px solid #f0f0f0; }
  .summary-item .guidance { font-size: 12px; color: #555; margin-top: 2px; }
  .summary-card a {
    display: inline-block;
    margin-top: 8px;
    color: var(--navy);
    font-weight: 600;
    text-decoration: none;
    border: 1px solid var(--navy);
    border-radius: 8px;
    padding: 6px 12px;
    font-size: 12px;
  }
  .summary-card a:hover { background: var(--navy); color: #fff; }

  .handoff-card {
    align-self: flex-start;
    max-width: 90%;
    border: 1px solid var(--gold);
    background: #fffaf0;
    border-radius: 12px;
    padding: 12px 14px;
    font-size: 13px;
  }
  .handoff-card h4 { margin: 0 0 8px; font-size: 13px; color: var(--navy); }
  .handoff-card a {
    display: block;
    margin-top: 6px;
    color: var(--navy);
    text-decoration: none;
    font-weight: 600;
    padding: 6px 10px;
    border: 1px solid var(--navy);
    border-radius: 8px;
    text-align: center;
  }
  .handoff-card a:hover { background: var(--navy); color: #fff; }

  .input-row {
    display: flex;
    gap: 8px;
    padding: 12px;
    border-top: 1px solid var(--border);
  }
  .input-row input {
    flex: 1;
    border: 1px solid var(--border);
    border-radius: 8px;
    padding: 10px 12px;
    font-size: 14px;
  }
  .input-row button {
    background: var(--navy);
    color: #fff;
    border: none;
    border-radius: 8px;
    padding: 10px 16px;
    font-size: 14px;
    cursor: pointer;
  }
  .input-row button:disabled { opacity: 0.5; cursor: default; }

  .need-human-btn {
    font-size: 11px;
    color: #777;
    text-align: center;
    padding: 6px;
    cursor: pointer;
    text-decoration: underline;
  }
</style>
</head>
<body>

<div class="widget">
  <div class="header">
    <h1>Supply SA Vendor Assistant</h1>
    <p>Certification help, document prep, and events</p>
  </div>

  <div class="messages" id="messages"></div>

  <div class="need-human-btn" id="needHumanBtn">Need to talk to a human instead?</div>

  <div class="input-row">
    <input type="text" id="userInput" placeholder="Ask a question..." />
    <button id="sendBtn">Send</button>
  </div>
</div>

<script>
const API_BASE = "";

let history = [];
let flow = null; // holds in-progress readiness flow state

const messagesEl = document.getElementById("messages");
const inputEl = document.getElementById("userInput");
const sendBtn = document.getElementById("sendBtn");
const needHumanBtn = document.getElementById("needHumanBtn");

function addMessage(text, sender) {
  const div = document.createElement("div");
  div.className = "msg " + sender;
  div.textContent = text;
  messagesEl.appendChild(div);
  scrollDown();
  return div;
}

function scrollDown() {
  messagesEl.scrollTop = messagesEl.scrollHeight;
}

function addHandoffCard(handoff) {
  const card = document.createElement("div");
  card.className = "handoff-card";
  card.innerHTML =
    "<h4>Want to talk to someone directly?</h4>" +
    "<a href=\"mailto:" + handoff.supportEmail + "\">Email: " + handoff.supportEmail + "</a>" +
    "<a href=\"" + handoff.teamPageUrl + "\" target=\"_blank\" rel=\"noopener\">" + handoff.teamPageLabel + "</a>";
  messagesEl.appendChild(card);
  scrollDown();
}

function addRenewalChecklistCard(items) {
  const card = document.createElement("div");
  card.className = "group-card";
  let html = "<h4>Renewal Document Checklist</h4><ul>";
  items.forEach((item) => {
    html += "<li><strong>" + item.label + "</strong> &mdash; " + item.guidance + "</li>";
  });
  html += "</ul>";
  card.innerHTML = html;
  messagesEl.appendChild(card);
  scrollDown();
}

// ---------- Greeting with three quick-reply buttons ----------
async function loadGreeting() {
  try {
    const res = await fetch(API_BASE + "/api/greeting");
    const data = await res.json();
    addMessage(data.message, "bot");
    addOptionButtons(data.options, (choice) => {
      if (choice.id === "readiness") startReadinessFlow();
      else if (choice.id === "question") promptForQuestion();
      else if (choice.id === "events") loadEvents();
    });
  } catch (err) {
    addMessage("👋 Welcome to Supply SA. Ask me a question, or type to get started.", "bot");
  }
}

function addOptionButtons(options, onChoose, opts) {
  const settings = opts || {};
  const group = document.createElement("div");
  group.className = "option-group";
  const buttons = [];
  options.forEach((opt) => {
    const btn = document.createElement("button");
    btn.className = "option-btn";
    btn.textContent = opt.label;
    btn.addEventListener("click", () => {
      if (settings.multi) {
        btn.classList.toggle("selected");
      } else {
        buttons.forEach((b) => (b.disabled = true));
        addMessage(opt.label, "user");
        onChoose(opt);
      }
    });
    buttons.push(btn);
    group.appendChild(btn);
  });

  if (settings.multi) {
    const confirmBtn = document.createElement("button");
    confirmBtn.className = "multi-select-confirm";
    confirmBtn.textContent = "Continue";
    confirmBtn.addEventListener("click", () => {
      const selected = options.filter((opt, i) => buttons[i].classList.contains("selected"));
      buttons.forEach((b) => (b.disabled = true));
      confirmBtn.disabled = true;
      addMessage(selected.length ? selected.map((s) => s.label).join(", ") : "(none selected)", "user");
      onChoose(selected);
    });
    group.appendChild(confirmBtn);
  }

  messagesEl.appendChild(group);
  scrollDown();
}

function promptForQuestion() {
  addMessage("Sure — go ahead and type your question below.", "bot");
}

// ---------- Events flow ----------
async function loadEvents() {
  try {
    const res = await fetch(API_BASE + "/api/events");
    const data = await res.json();
    const card = document.createElement("div");
    card.className = "summary-card";
    card.innerHTML =
      "<p>" + data.message + "</p>" +
      "<a href=\"" + data.eventsPageUrl + "\" target=\"_blank\" rel=\"noopener\">" + data.eventsPageLabel + "</a>";
    messagesEl.appendChild(card);
    scrollDown();
  } catch (err) {
    addMessage("You can see upcoming events at https://supply-sa.org/events/", "bot");
  }
}

// ---------- Readiness flow ----------
async function startReadinessFlow() {
  flow = { answers: {}, questionIndex: 0 };
  try {
    const res = await fetch(API_BASE + "/api/readiness-flow/start");
    const data = await res.json();
    addMessage(data.intro, "bot");
    askProfileQuestion(data.question, data.questionIndex);
  } catch (err) {
    addMessage("Sorry, I couldn't start the readiness check right now. Please try again in a moment.", "bot");
  }
}

function askProfileQuestion(question, index) {
  addMessage(question.prompt, "bot");
  if (question.note) addMessage(question.note, "bot");

  addOptionButtons(
    question.options,
    (choice) => {
      if (question.type === "multi_select") {
        flow.answers[question.id] = choice.map((c) => c.value);
      } else {
        flow.answers[question.id] = choice.value;
      }
      advanceProfile(index);
    },
    { multi: question.type === "multi_select" }
  );
}

async function advanceProfile(index) {
  try {
    const res = await fetch(API_BASE + "/api/readiness-flow/next-question", {
      method: "POST",
      headers: { "Content-Type": "application/json" },
      body: JSON.stringify({ questionIndex: index, answers: flow.answers }),
    });
    const data = await res.json();

    if (data.done) {
      if (data.isRenewal) {
        addMessage(data.renewalIntro, "bot");
        addRenewalChecklistCard(data.renewalItems);
        addMessage(data.renewalOutro, "bot");
        flow = null;
        return;
      }
      flow.applicableGroups = data.applicableGroups;
      flow.groupIndex = 0;
      flow.groupStatus = {};
      addMessage("Got it — here's what your application will need. I've grouped it so this goes fast.", "bot");
      if (data.responseRequirements) {
        // Save for the end-of-flow summary rather than showing immediately.
        flow.responseRequirements = data.responseRequirements;
      }
      askGroupQuestion();
    } else {
      askProfileQuestion(data.question, data.questionIndex);
    }
  } catch (err) {
    addMessage("Sorry, something went wrong continuing the readiness check. Please try again.", "bot");
  }
}

function askGroupQuestion() {
  if (!flow.applicableGroups.length) {
    finishReadinessFlow();
    return;
  }
  const group = flow.applicableGroups[flow.groupIndex];
  const card = document.createElement("div");
  card.className = "group-card";
  let html = "<h4>" + group.title + " (" + (flow.groupIndex + 1) + " of " + flow.applicableGroups.length + ")</h4><ul>";
  group.items.forEach((item) => {
    html += "<li>" + item + "</li>";
  });
  html += "</ul>";
  if (group.note) html += "<div class=\"group-note\">" + group.note + "</div>";
  html += "<div class=\"group-actions\">" +
    "<button class=\"group-btn primary\" data-status=\"have_all\">Have all of these</button>" +
    "<button class=\"group-btn\" data-status=\"not_yet\">Not yet</button>" +
    "</div>";
  card.innerHTML = html;

  card.querySelectorAll(".group-btn").forEach((btn) => {
    btn.addEventListener("click", () => {
      card.querySelectorAll(".group-btn").forEach((b) => (b.disabled = true));
      flow.groupStatus[group.id] = btn.dataset.status;
      flow.groupIndex += 1;
      if (flow.groupIndex < flow.applicableGroups.length) {
        askGroupQuestion();
      } else {
        finishReadinessFlow();
      }
    });
  });

  messagesEl.appendChild(card);
  scrollDown();
}

async function finishReadinessFlow() {
  try {
    const res = await fetch(API_BASE + "/api/readiness-flow/summary", {
      method: "POST",
      headers: { "Content-Type": "application/json" },
      body: JSON.stringify({ answers: flow.answers, groupStatus: flow.groupStatus }),
    });
    const data = await res.json();

    const card = document.createElement("div");
    card.className = "summary-card";
    let html = "<h4>" + (data.isFullyReady ? "You're ready to apply!" : "Here's where you stand") + "</h4>";

    if (data.ready.length) {
      html += "<div class=\"summary-section\"><div class=\"label\">Ready</div>";
      data.ready.forEach((g) => {
        html += "<div class=\"summary-item\">" + g.title + "</div>";
      });
      html += "</div>";
    }

    if (data.missing.length) {
      html += "<div class=\"summary-section\"><div class=\"label\">Still needed</div>";
      data.missing.forEach((g) => {
        html += "<div class=\"summary-item\"><strong>" + g.title + "</strong>";
        g.items.forEach((item) => {
          html += "<div class=\"guidance\">" + item.label + " — " + item.guidance + "</div>";
        });
        if (g.note) html += "<div class=\"guidance\">" + g.note + "</div>";
        html += "</div>";
      });
      html += "</div>";
    }

    html += "<a href=\"" + data.applicationPortalUrl + "\" target=\"_blank\" rel=\"noopener\">Go to Application Portal</a>";
    card.innerHTML = html;
    messagesEl.appendChild(card);
    scrollDown();

    if (flow && flow.responseRequirements) {
      addMessage(flow.responseRequirements, "bot");
    }

    addMessage("This is a screening check, not an official application review — a certification specialist will confirm everything once you apply.", "bot");
    addMessage("Want to talk to someone directly?", "bot");
    addOptionButtons(
      [
        { id: "yes", label: "Yes, show me contact info" },
        { id: "no", label: "No, I'm good for now" },
      ],
      (choice) => {
        if (choice.id === "yes") {
          addHandoffCard({
            supportEmail: "support@supply-sa.org",
            teamPageUrl: "https://supply-sa.org/meet-the-team/",
            teamPageLabel: "Meet the Certification Team — Book a Call",
          });
        } else {
          addMessage("Sounds good — I'm here if you think of anything else.", "bot");
        }
      }
    );
  } catch (err) {
    addMessage("Sorry, something went wrong building your summary. Please try again, or talk to our team directly.", "bot");
  } finally {
    flow = null;
  }
}

// Phrases that should route directly to a real flow instead of going
// to the free-text LLM chat endpoint. The chat endpoint has no
// awareness of the guided readiness flow's live state, so without this
// check, things like "start over" or "check cert readiness" would get
// a generic or fabricated-sounding reply instead of actually restarting
// the real flow.
function detectDirectIntent(text) {
  const lower = text.toLowerCase().trim();

  const restartPhrases = ["start over", "restart", "start again", "reset", "begin again"];
  if (restartPhrases.some((p) => lower.includes(p))) {
    return "restart";
  }

  const readinessPhrases = [
    "check cert", "certification readiness", "cert readiness", "check readiness",
    "check my readiness", "readiness check", "am i ready", "check certification",
  ];
  if (readinessPhrases.some((p) => lower.includes(p))) {
    return "readiness";
  }

  const eventsPhrases = ["upcoming events", "see events", "what events", "any events"];
  if (eventsPhrases.some((p) => lower.includes(p))) {
    return "events";
  }

  return null;
}

// ---------- Free-text chat (FAQ / general questions) ----------
async function sendMessage(text) {
  const intent = detectDirectIntent(text);
  if (intent) {
    addMessage(text, "user");
    inputEl.value = "";
    flow = null; // clear any in-progress flow state before restarting
    if (intent === "restart") {
      messagesEl.innerHTML = "";
      history = [];
      loadGreeting();
    } else if (intent === "readiness") {
      startReadinessFlow();
    } else if (intent === "events") {
      loadEvents();
    }
    return;
  }

  addMessage(text, "user");
  history.push({ role: "user", content: text });
  inputEl.value = "";
  sendBtn.disabled = true;

  try {
    const res = await fetch(API_BASE + "/api/chat", {
      method: "POST",
      headers: { "Content-Type": "application/json" },
      body: JSON.stringify({ message: text, history: history.slice(0, -1) }),
    });
    const data = await res.json();

    if (data.error) {
      addMessage("Sorry, something went wrong. Please try again.", "bot");
    } else {
      addMessage(data.reply, "bot");
      history.push({ role: "assistant", content: data.reply });
      if (data.needsHandoff && data.handoff) {
        addHandoffCard(data.handoff);
      }
    }
  } catch (err) {
    addMessage("Connection error. Please check your internet and try again.", "bot");
  } finally {
    sendBtn.disabled = false;
  }
}

sendBtn.addEventListener("click", () => {
  const text = inputEl.value.trim();
  if (text) sendMessage(text);
});

inputEl.addEventListener("keypress", (e) => {
  if (e.key === "Enter") {
    const text = inputEl.value.trim();
    if (text) sendMessage(text);
  }
});

needHumanBtn.addEventListener("click", () => {
  addMessage("Need to talk to a human instead?", "user");
  addHandoffCard({
    supportEmail: "support@supply-sa.org",
    teamPageUrl: "https://supply-sa.org/meet-the-team/",
    teamPageLabel: "Meet the Certification Team — Book a Call",
  });
});

loadGreeting();
</script>

</body>
</html>
