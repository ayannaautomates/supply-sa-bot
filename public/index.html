<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Supply SA — Vendor Certification Assistant</title>
<style>
  :root {
    --navy: #1b2a4a;
    --gold: #c9a227;
    --bg: #f6f7f9;
    --bubble-bot: #ffffff;
    --bubble-user: #1b2a4a;
    --text: #1f2430;
    --border: #e1e4e9;
  }
  * { box-sizing: border-box; }
  body {
    margin: 0;
    font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
    background: var(--bg);
    color: var(--text);
  }
  .widget {
    max-width: 480px;
    margin: 24px auto;
    background: #fff;
    border-radius: 14px;
    box-shadow: 0 4px 24px rgba(0,0,0,0.08);
    overflow: hidden;
    display: flex;
    flex-direction: column;
    height: 640px;
  }
  .header {
    background: var(--navy);
    color: #fff;
    padding: 16px 20px;
  }
  .header h1 { font-size: 16px; margin: 0 0 2px; }
  .header p { font-size: 12px; margin: 0; opacity: 0.8; }

  .checklist {
    padding: 14px 16px;
    border-bottom: 1px solid var(--border);
    background: #fafbfc;
  }
  .checklist-title { font-size: 12px; font-weight: 600; color: #555; margin-bottom: 8px; text-transform: uppercase; letter-spacing: 0.03em; }
  .checklist-item {
    display: flex;
    align-items: center;
    gap: 8px;
    padding: 6px 0;
    font-size: 13px;
    cursor: pointer;
    user-select: none;
  }
  .checklist-item input { width: 16px; height: 16px; accent-color: var(--navy); }
  .checklist-item.optional { color: #777; }

  .messages {
    flex: 1;
    overflow-y: auto;
    padding: 16px;
    display: flex;
    flex-direction: column;
    gap: 10px;
  }
  .msg { max-width: 85%; padding: 10px 14px; border-radius: 12px; font-size: 14px; line-height: 1.45; white-space: pre-wrap; }
  .msg.bot { background: var(--bubble-bot); border: 1px solid var(--border); align-self: flex-start; }
  .msg.user { background: var(--bubble-user); color: #fff; align-self: flex-end; }

  .handoff-card {
    align-self: flex-start;
    max-width: 90%;
    border: 1px solid var(--gold);
    background: #fffaf0;
    border-radius: 12px;
    padding: 12px 14px;
    font-size: 13px;
  }
  .handoff-card h4 { margin: 0 0 8px; font-size: 13px; color: var(--navy); }
  .handoff-card a {
    display: block;
    margin-top: 6px;
    color: var(--navy);
    text-decoration: none;
    font-weight: 600;
    padding: 6px 10px;
    border: 1px solid var(--navy);
    border-radius: 8px;
    text-align: center;
  }
  .handoff-card a:hover { background: var(--navy); color: #fff; }

  .input-row {
    display: flex;
    gap: 8px;
    padding: 12px;
    border-top: 1px solid var(--border);
  }
  .input-row input {
    flex: 1;
    border: 1px solid var(--border);
    border-radius: 8px;
    padding: 10px 12px;
    font-size: 14px;
  }
  .input-row button {
    background: var(--navy);
    color: #fff;
    border: none;
    border-radius: 8px;
    padding: 10px 16px;
    font-size: 14px;
    cursor: pointer;
  }
  .input-row button:disabled { opacity: 0.5; cursor: default; }

  .need-human-btn {
    font-size: 11px;
    color: #777;
    text-align: center;
    padding: 6px;
    cursor: pointer;
    text-decoration: underline;
  }
</style>
</head>
<body>

<div class="widget">
  <div class="header">
    <h1>Supply SA Vendor Assistant</h1>
    <p>Check your certification readiness</p>
  </div>

  <div class="checklist" id="checklist">
    <div class="checklist-title">Your Documents</div>
    <!-- populated by JS from /api/checklist -->
  </div>

  <div class="messages" id="messages"></div>

  <div class="need-human-btn" id="needHumanBtn">Need to talk to a human instead?</div>

  <div class="input-row">
    <input type="text" id="userInput" placeholder="Ask a question..." />
    <button id="sendBtn">Send</button>
  </div>
</div>

<script>
const API_BASE = ""; // same origin; change if backend is hosted separately

let vendorStatus = {};
let history = [];

const checklistEl = document.getElementById("checklist");
const messagesEl = document.getElementById("messages");
const inputEl = document.getElementById("userInput");
const sendBtn = document.getElementById("sendBtn");
const needHumanBtn = document.getElementById("needHumanBtn");

async function loadChecklist() {
  const res = await fetch(`${API_BASE}/api/checklist`);
  const data = await res.json();
  data.requirements.forEach((req) => {
    const row = document.createElement("label");
    row.className = "checklist-item" + (req.required ? "" : " optional");
    row.innerHTML = `
      <input type="checkbox" data-id="${req.id}" />
      <span>${req.label}${req.required ? "" : " (if applicable)"}</span>
    `;
    checklistEl.appendChild(row);
  });
  checklistEl.querySelectorAll("input[type=checkbox]").forEach((cb) => {
    cb.addEventListener("change", (e) => {
      vendorStatus[e.target.dataset.id] = e.target.checked;
    });
  });
}

function addMessage(text, sender) {
  const div = document.createElement("div");
  div.className = `msg ${sender}`;
  div.textContent = text;
  messagesEl.appendChild(div);
  messagesEl.scrollTop = messagesEl.scrollHeight;
}

function addHandoffCard(handoff) {
  const card = document.createElement("div");
  card.className = "handoff-card";
  card.innerHTML = `
    <h4>Want to talk to someone directly?</h4>
    <a href="mailto:${handoff.supportEmail}">Email: ${handoff.supportEmail}</a>
    <a href="${handoff.teamPageUrl}" target="_blank" rel="noopener">${handoff.teamPageLabel}</a>
  `;
  messagesEl.appendChild(card);
  messagesEl.scrollTop = messagesEl.scrollHeight;
}

async function sendMessage(text) {
  addMessage(text, "user");
  history.push({ role: "user", content: text });
  inputEl.value = "";
  sendBtn.disabled = true;

  try {
    const res = await fetch(`${API_BASE}/api/chat`, {
      method: "POST",
      headers: { "Content-Type": "application/json" },
      body: JSON.stringify({ message: text, vendorStatus, history: history.slice(0, -1) }),
    });
    const data = await res.json();

    if (data.error) {
      addMessage("Sorry, something went wrong. Please try again.", "bot");
    } else {
      addMessage(data.reply, "bot");
      history.push({ role: "assistant", content: data.reply });
      if (data.needsHandoff && data.handoff) {
        addHandoffCard(data.handoff);
      }
    }
  } catch (err) {
    addMessage("Connection error. Please check your internet and try again.", "bot");
  } finally {
    sendBtn.disabled = false;
  }
}

sendBtn.addEventListener("click", () => {
  const text = inputEl.value.trim();
  if (text) sendMessage(text);
});

inputEl.addEventListener("keypress", (e) => {
  if (e.key === "Enter") {
    const text = inputEl.value.trim();
    if (text) sendMessage(text);
  }
});

needHumanBtn.addEventListener("click", async () => {
  // Always-available fallback — fetches handoff info directly without
  // going through the LLM at all.
  const res = await fetch(`${API_BASE}/api/chat`, {
    method: "POST",
    headers: { "Content-Type": "application/json" },
    body: JSON.stringify({ message: "talk to someone", vendorStatus, history }),
  });
  const data = await res.json();
  if (data.handoff) addHandoffCard(data.handoff);
});

// Initial greeting
loadChecklist();
addMessage("Hi! Check off the documents you already have, and I'll let you know what's still missing for certification.
